<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>曜日天梯榜 - LADDER DATA SYS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            /* 保留所有特效，僅替換為「戰情儀表板」配色 */
            --eva-dark-bg: #0b0e17; /* 戰情室深海軍藍 */
            --eva-purple: #00e5ff; /* 原紫色替換為：霓虹青 (主點綴與發光色) */
            --eva-green: #00e676; /* 優良狀態：明亮科技綠 */
            --eva-orange: #ff4d4d; /* 警告狀態：警戒紅 */
            
            --color-platinum: #00e5ff;
            --color-gold: #ffd700;
            --color-silver: #ff4444; /* 白銀改為：紅色系 */
            --color-bronze: #00e676; /* 青銅改為：綠色系 */
            --glass-bg: rgba(20, 26, 35, 0.95); /* 帶藍色調的深灰玻璃 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--eva-dark-bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* === Loading === */
        #loadingOverlay {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--eva-dark-bg); z-index: 10000; align-items: center; justify-content: center; flex-direction: column;
        }
        .loader-text { font-size: 0; animation: blink 0.5s infinite alternate; }
        .loader-text::after { content: "CONNECTING TO RADAR..."; font-size: 2rem; font-family: 'Orbitron', sans-serif; color: var(--eva-purple); }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

        /* === Background Effects === */
        .scanline-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(0, 229, 255, 0.02), rgba(0, 230, 118, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
        .tactical-grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(20deg) scale(1.5);
            animation: gridMove 20s linear infinite; pointer-events: none;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

        /* === Header === */
        .sticky-controls {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 14, 23, 0.98); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--eva-purple); padding-bottom: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }
        .header-box {
            padding: 20px 0 15px 0; margin-bottom: 10px; position: relative;
            background: linear-gradient(0deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            border-top: 1px solid rgba(0, 229, 255, 0.3);
        }
        .title-card {
            font-family: 'Noto Sans TC', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: 0.1em;
            color: #fff; text-align: center; text-shadow: 2px 2px 0px #000, -1px -1px 0 var(--eva-purple), 0 0 20px var(--eva-purple);
            margin: 0; line-height: 1; transform: scaleY(1.1);
        }
        .sub-title {
            font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: var(--eva-green); letter-spacing: 3px;
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 8px; font-weight: bold;
        }
        .sub-title::before, .sub-title::after { content: ""; display: block; width: 40px; height: 2px; background: var(--eva-green); box-shadow: 0 0 5px var(--eva-green); }
        
        .deco-corner-text { position: absolute; font-family: 'Orbitron', monospace; font-size: 0; color: var(--eva-orange); opacity: 0.8; line-height: 1.2; }
        .deco-tl { top: 8px; left: 15px; border-left: 2px solid var(--eva-purple); padding-left: 6px; }
        .deco-tl::after { content: "DATA\nSYS."; font-size: 0.5rem; color: var(--eva-purple); display: block; }
        .deco-br { bottom: 8px; right: 15px; border-right: 2px solid var(--eva-green); padding-right: 6px; text-align: right; }
        .deco-br::after { content: "RADAR\nONLINE"; font-size: 0.5rem; color: var(--eva-green); display: block; }

        /* === Filters === */
        .filter-container { width: 100%; overflow-x: auto; padding: 5px 10px; text-align: center; }
        .filter-group { display: inline-flex; justify-content: center; gap: 10px; white-space: nowrap; padding-bottom: 5px; margin: 0 auto; }
        .filter-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888; 
            padding: 10px 15px; cursor: pointer; font-size: 0.75rem; border-radius: 2px; transition: 0.2s;
            flex: 0 0 auto; min-width: 90px; text-align: center; 
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif; font-weight: 700; letter-spacing: 1px;
        }
        .filter-btn.active { color: #000 !important; font-weight: 900; transform: scale(1.02); border: none; }
        .btn-plat.active { background: var(--color-platinum); box-shadow: 0 0 10px var(--color-platinum); }
        .btn-gold.active { background: var(--color-gold); box-shadow: 0 0 10px var(--color-gold); }
        .btn-silver.active { background: var(--color-silver); box-shadow: 0 0 10px var(--color-silver); }
        .btn-bronze.active { background: var(--color-bronze); box-shadow: 0 0 10px var(--color-bronze); }

        .search-box { display: flex; justify-content: center; padding: 5px 15px; }
        #searchInput {
            background: rgba(0,0,0,0.6); border: 1px solid var(--eva-purple);
            color: #fff; padding: 12px; width: 100%; max-width: 600px;
            text-align: center; border-radius: 30px; font-size: 16px;
            outline: none; transition: 0.3s;
            font-family: 'Noto Sans TC', sans-serif;
        }
        #searchInput:focus { border-color: var(--eva-green); box-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }

        /* === View === */
        .ladder-wrapper { max-width: 1200px; margin: 0 auto; padding: 10px 5px; position:relative; z-index:1; width: 100%; }
        .ladder-wrapper > div:first-child { font-size: 0 !important; }
        .ladder-wrapper > div:first-child::after { content: "曜日戰情中心 // TACTICAL LADDER RADAR"; font-size: 0.65rem; color: #fff; }

        table { width: 100%; display: block; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Card View Layout */
        tbody.card-view { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
            padding: 10px 0; 
            width: 100%;
        }
        tbody.card-view tr { 
            display: flex; flex-direction: column; background: var(--glass-bg); border-radius: 6px; position: relative; padding: 15px; animation: slideIn 0.5s both;
            border: 1px solid #333; height: auto; overflow: hidden; cursor: pointer; transition: 0.2s;
            width: 100%; box-sizing: border-box;
        }
        tbody.card-view tr:hover { transform: scale(1.02); z-index: 10;}
        tbody.card-view td { display: block; width: 100%; border: none; text-align: left; padding: 0; }
        tbody.card-view .col-rank { display: none !important; }

        /* 分組邊框特效 */
        tbody.card-view tr.row-platinum { border: 2px solid var(--color-platinum) !important; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2) !important; }
        tbody.card-view tr.row-platinum::before { content: "CLASSIFIED // TOP SECRET"; position: absolute; top: 0; left: 0; width: 100%; background: var(--color-platinum); color: #000; font-size: 0.5rem; font-weight: 900; text-align: center; padding: 1px; z-index: 2; }

        tbody.card-view tr.row-gold { border: 1px solid var(--color-gold) !important; box-shadow: 0 0 15px rgba(255, 215, 0, 0.15) !important; }
        tbody.card-view tr.row-gold::before { content: "PRIORITY // FIRST CLASS"; position: absolute; top: 0; left: 0; width: 100%; background: linear-gradient(90deg, transparent, var(--color-gold), transparent); color: #000; font-size: 0.5rem; font-weight: 900; text-align: center; padding: 1px; z-index: 2; }

        /* 白銀改紅色系 rgba(255, 68, 68) */
        tbody.card-view tr.row-silver { border: 1px solid var(--color-silver) !important; box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.05) !important; }
        tbody.card-view tr.row-silver::before { content: "TACTICAL // RESERVE"; position: absolute; top: 0; left: 0; width: 100%; background: rgba(255, 68, 68, 0.1); border-bottom: 1px solid var(--color-silver); color: var(--color-silver); font-size: 0.5rem; font-weight: 900; text-align: center; padding: 1px; z-index: 2; }

        /* 青銅改綠色系 rgba(0, 230, 118) */
        tbody.card-view tr.row-bronze { border: 1px dashed var(--color-bronze) !important; background-image: linear-gradient(0deg, transparent 50%, rgba(0, 230, 118, 0.05) 50%); background-size: 100% 4px; }
        tbody.card-view tr.row-bronze::before { content: "CALIBRATING // TRAINEE"; position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 230, 118, 0.1); color: var(--color-bronze); font-size: 0.5rem; font-weight: 900; text-align: center; padding: 1px; z-index: 2; }

        /* Rank Badge 特效 */
        .rank-badge-box {
            display: inline-block; width: 42px; height: 42px; line-height: 42px;
            text-align: center; border-radius: 50%; font-family: 'Orbitron', sans-serif; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1); color: #888; flex-shrink: 0;
        }
        .rank-1-style { font-size: 1.8rem; color: #000; background: #ffd700; box-shadow: 0 0 15px #ffd700; border: 2px solid #fff; transform: scale(1.1); }
        .rank-2-style { font-size: 1.5rem; color: #000; background: var(--color-silver); box-shadow: 0 0 10px var(--color-silver); border: 2px solid #fff; }
        .rank-3-style { font-size: 1.5rem; color: #000; background: var(--color-bronze); box-shadow: 0 0 10px var(--color-bronze); border: 2px solid #fff; }
        .rank-top10-style { font-size: 1.4rem; color: #fff; font-style: italic; text-shadow: 0 0 8px rgba(255,255,255,0.8); width: auto; height: auto; border-radius: 0; border: none; padding: 0 4px; }
        
        .team-badge {
            display: inline-block; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
            border: 1px solid #555; color: #aaa; background: rgba(0, 0, 0, 0.5);
            font-weight: 900; letter-spacing: 1px; vertical-align: middle;
            text-shadow: 0 0 5px rgba(0,0,0,0.8); box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        
        .card-header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }

        .pilot-tag { 
            font-size: 0.6rem; color: var(--eva-purple); border: 1px solid var(--eva-purple); 
            padding: 2px 8px; border-radius: 3px; display: inline-block; margin-bottom: 0; font-weight: bold;
            background: rgba(0,0,0,0.6); box-shadow: 0 0 5px rgba(0, 229, 255, 0.2);
        }

        .score-bg-watermark {
            position: absolute; top: 0px; right: 10px; font-size: 5rem; font-family: 'Impact', sans-serif;
            color: #fff; opacity: 0.08; pointer-events: none; z-index: 0;
        }
        .card-name { font-size: 1.4rem; font-weight: 900; color: #fff; position: relative; z-index: 1; }
        .card-info { font-size: 0.7rem; color: #aaa; font-family: 'Orbitron', monospace; margin-bottom: 5px; position: relative; z-index: 1; }
        .card-latest-row {
            font-size: 0.75rem; color: #ccc; margin-bottom: 10px; 
            background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 2px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--eva-green); position: relative; z-index: 1;
        }
        .result-highlight { color: #fff; font-weight: bold; text-shadow: 0 0 8px var(--eva-green); animation: pulseText 2s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .sync-bar-container { width: 100%; height: 14px; background: #000; margin: 8px 0; border-radius: 2px; overflow: hidden; border: 1px solid #444; position: relative; z-index: 1;}
        .sync-fill { height: 100%; background: repeating-linear-gradient(90deg, #004d40 0%, var(--eva-purple) 50%, #b2ebf2 100%); background-size: 200% 100%; box-shadow: 0 0 20px var(--eva-purple); animation: flowBar 1.5s linear infinite; }
        @keyframes flowBar { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .stats-hud { display: flex; justify-content: space-between; gap: 5px; font-size: 0.65rem; color: #888; font-family: 'Orbitron', monospace; border-top: 1px solid #333; padding-top: 8px; margin-top: 8px; position: relative; z-index: 1;}

        /* HUD 偽裝 */
        .stats-hud > div { position: relative; overflow: hidden; }
        .stats-hud > div:first-child::before {
            content: "水見式純度:"; position: absolute; left: 0; top: 0; padding-right: 5px;
            background: var(--glass-bg); 
            color: #888; font-family: 'Noto Sans TC', sans-serif;
        }
        .stats-hud > div:last-child::before {
            content: "制約與誓約:"; position: absolute; left: 0; top: 0; padding-right: 5px;
            background: var(--glass-bg);
            color: #888; font-family: 'Noto Sans TC', sans-serif;
        }

        /* === Modal Environment & Card Styles === */
        .modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; 
            backdrop-filter: blur(8px); align-items: center; justify-content: center; 
            transition: background 0.5s ease;
        }

        .modal[data-rank="ssr"] { background: radial-gradient(circle at 50% 30%, rgba(255, 215, 0, 0.4) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(0, 229, 255, 0.3) 0%, transparent 30%), radial-gradient(circle at 20% 80%, rgba(0, 230, 118, 0.3) 0%, transparent 40%), #0b0e17; }
        .modal[data-rank="sr"] { background: linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px), radial-gradient(circle at center, rgba(0, 20, 40, 0.8) 0%, #0b0e17 100%); background-size: 40px 40px, 40px 40px, 100% 100%; }
        .modal[data-rank="s"] { background: repeating-conic-gradient(from 0deg, rgba(0, 229, 255, 0.05) 0deg, transparent 10deg, rgba(0, 229, 255, 0.05) 20deg), radial-gradient(circle at center, transparent 0%, #0b0e17 80%); }
        .modal[data-rank="a"] { background: repeating-radial-gradient(circle at center, transparent 0, transparent 49px, rgba(0, 230, 118, 0.1) 50px), radial-gradient(circle at center, rgba(0, 30, 20, 0.5) 0%, #0b0e17 100%); }
        .modal[data-rank="b"] { background: repeating-linear-gradient(45deg, rgba(255, 77, 77, 0.05), rgba(255, 77, 77, 0.05) 10px, transparent 10px, transparent 20px), linear-gradient(to bottom, #111, #0b0e17); }
        .modal[data-rank="c"] { background: rgba(11, 14, 23, 0.98); }

        .modal-card { 
            width: 320px; height: 620px; background: linear-gradient(145deg, #1a1e29, #0b0e17); 
            border-radius: 15px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            overflow: hidden; display: flex; flex-direction: column; 
            border: 2px solid #444; transform-style: preserve-3d; 
            animation: cardEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .modal-card.rank-ssr { border: 3px solid #ffd700; box-shadow: 0 0 60px rgba(255, 215, 0, 0.5); }
        .modal-card.rank-ssr .card-visual-area::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent); animation: sheen 2s infinite; z-index: 10; pointer-events: none;
        }
        .modal-card.rank-ssr::after { content: '👑'; font-size: 150px; position: absolute; top: 10%; left: 50%; transform: translateX(-50%) rotate(-10deg); opacity: 0.1; z-index: 0; filter: drop-shadow(0 0 10px gold); }
        .modal-card.rank-sr { border: 2px solid var(--color-platinum); box-shadow: 0 0 40px rgba(0, 229, 255, 0.4); }
        .modal-card.rank-sr .card-visual-area { background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 229, 255, 0.1) 3px); background-size: 100% 4px; animation: gridMove 10s linear infinite; }
        .modal-card.rank-sr::after { content: '💠'; font-size: 150px; position: absolute; top: 10%; left: 50%; transform: translateX(-50%); opacity: 0.1; z-index: 0; }
        .modal-card.rank-s { border: 2px solid var(--eva-purple); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
        .modal-card.rank-s .card-visual-area::after { content: ''; position: absolute; inset: 0; background: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 0l2.5 7.5L20 10l-7.5 2.5L10 20l-2.5-7.5L0 10l7.5-2.5z" fill="%2300e5ff" fill-opacity="0.1"/></svg>'); opacity: 0.5; }
        .modal-card.rank-s::after { content: '★'; font-size: 150px; position: absolute; top: 10%; left: 50%; transform: translateX(-50%); opacity: 0.1; z-index: 0; color: var(--eva-purple); }
        .modal-card.rank-a { border: 1px solid var(--eva-green); box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
        .modal-card.rank-a .card-visual-area { background: radial-gradient(circle, transparent 20%, rgba(0, 230, 118, 0.05) 21%, transparent 22%); background-size: 50px 50px; }
        .modal-card.rank-a::after { content: '❮'; font-size: 150px; position: absolute; top: 10%; left: 50%; transform: translateX(-50%) rotate(90deg); opacity: 0.1; z-index: 0; color: var(--eva-green); }
        .modal-card.rank-b { border: 1px solid var(--eva-orange); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        .modal-card.rank-b::after { content: '●'; font-size: 150px; position: absolute; top: 10%; left: 50%; transform: translateX(-50%); opacity: 0.05; z-index: 0; color: var(--eva-orange); }
        .modal-card.rank-c { border: 1px solid #555; background: #111; }

        @keyframes sheen { 0% { transform: translate(-100%, -100%) rotate(45deg); } 100% { transform: translate(100%, 100%) rotate(45deg); } }

        .close-modal {
            position: absolute; top: 0; right: 0; width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1); border-left: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-size: 1.5rem; color: #fff;
            cursor: pointer; z-index: 100; transition: 0.2s; border-bottom-left-radius: 5px;
        }
        .close-modal:hover { background: var(--color-silver); color: #000; box-shadow: 0 0 15px rgba(255, 68, 68, 0.5); }

        .card-header-bar {
            height: 45px; background: linear-gradient(90deg, #1f2937, #111827);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 45px 0 15px; border-bottom: 1px solid #374151; z-index: 2;
        }
        .header-tier-text { font-family: 'Orbitron'; font-size: 1.0rem; letter-spacing: 1px; color: #fff; font-weight: 900; white-space: nowrap; overflow: visible; }
        .header-stars { color: #ffd700; font-size: 0.8rem; letter-spacing: 2px; margin-right: 10px; flex-shrink: 0; }

        .card-visual-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%); }
        .cartoon-avatar { width: auto; height: 80%; z-index: 10; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); animation: bob 3s ease-in-out infinite; }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .card-radar-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; opacity: 0.3; z-index: 1; animation: radarRotate 20s linear infinite; }
        @keyframes radarRotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .battle-type-badge {
            position: absolute; top: 12px; left: 12px; background: #000; border: 1px solid var(--eva-purple);
            color: var(--eva-purple); font-size: 0.6rem; padding: 3px 8px; z-index: 10; font-weight: bold;
            font-family: 'Orbitron', monospace; letter-spacing: 1px; box-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
        }
        .pilot-title {
            position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 0.8rem; font-weight: bold;
            text-shadow: 0 0 5px #000; font-style: italic; z-index: 10; background: rgba(0,0,0,0.6); padding: 4px 0; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-info-area { background: rgba(10, 14, 20, 0.95); padding: 15px; border-top: 2px solid #2a3441; z-index: 5; }
        .info-name { font-size: 1.5rem; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 5px; }
        .info-meta { font-size: 0.7rem; color: #888; font-family: 'Orbitron', monospace; display: flex; justify-content: space-between; }
        
        .card-sync-box { margin-top: 10px; background: #000; border: 1px solid #333; padding: 5px 10px; display: flex; align-items: center; justify-content: space-between; }
        .card-sync-label { font-size: 0; }
        .card-sync-label::after { content: "潛在氣量 (P.A.P)"; font-size: 0.65rem; color: var(--eva-green); font-family: 'Noto Sans TC', sans-serif;}
        .card-sync-val { font-family: 'Impact'; font-size: 1.5rem; color: #fff; }
        
        .skill-chips { display: flex; gap: 5px; margin-top: 8px; }
        .chip { flex: 1; background: #1a1e29; border: 1px solid #2a3441; color: #aaa; font-size: 0.6rem; text-align: center; padding: 2px 0; border-radius: 2px; }

        .card-history-box { margin-top: 10px; background: rgba(0, 0, 0, 0.6); border: 1px solid #333; padding: 6px; border-radius: 4px; }
        .history-label { font-size: 0.6rem; color: #888; border-bottom: 1px solid #444; margin-bottom: 5px; font-family: 'Orbitron', monospace; display: flex; justify-content: space-between; }
        .history-list-content { font-family: 'Noto Sans TC', monospace; font-size: 0.7rem; color: #ccc; max-height: 60px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 5px; }
        .history-list-content::-webkit-scrollbar { width: 3px; }
        .history-list-content::-webkit-scrollbar-thumb { background: var(--eva-purple); }
        .history-tag { background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.3); color: var(--eva-purple); padding: 2px 8px; border-radius: 2px; font-size: 0.65rem; }
    </style>
</head>
<body>

    <div class="scanline-overlay"></div>
    <div class="tactical-grid-bg"></div>

    <div id="loadingOverlay"><div class="loader-text">MAGI SYSTEM INITIALIZING</div></div>

    <div id="playerModal" class="modal"></div>

    <div class="sticky-controls">
        <div class="header-box">
            <div class="deco-corner-text deco-tl">MAGI<br>SYS.</div>
            <div class="deco-corner-text deco-br">VER<br>2.0</div>
            <div class="title-card">曜日天梯榜</div>
            <div class="sub-title">SOLAR CUP LEAGUE</div>
        </div>

        <div class="filter-container">
            <div class="filter-group">
                <button class="filter-btn btn-plat active" onclick="filterTier('platinum')">PLATINUM // 白金級</button>
                <button class="filter-btn btn-gold" onclick="filterTier('gold')">GOLD // 黃金級</button>
                <button class="filter-btn btn-silver" onclick="filterTier('silver')">SILVER // 白銀級</button>
                <button class="filter-btn btn-bronze" onclick="filterTier('bronze')">BRONZE // 青銅級</button>
            </div>
        </div>
        <div class="search-box"><input type="text" id="searchInput" oninput="searchPilot()" placeholder="搜尋 ID、姓名或常駐地..."></div>
    </div>

    <div class="ladder-wrapper">
        <div style="background: linear-gradient(90deg, var(--eva-purple), transparent); padding: 4px 15px; font-size: 0.65rem; margin-bottom: 10px; position:relative; z-index:1;">MAGI_VER.2.0: TACTICAL_OPS_READY</div>
        <table id="ladderTable">
            <tbody id="tableBody" class="card-view"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT40Ezc3eu9HtyGZL5bFHuNudksoBz7gVGXycPyGD22vZB2MxO7mCSXVTz-roAUpckS1pZy3dBE9jTy/pub?gid=2080286926&single=true&output=csv";
        let currentFilter = 'platinum';
        let globalPilots = [];

        window.onload = () => {
            fetch(CSV_URL + "&t=" + Date.now()).then(res => res.arrayBuffer()).then(buffer => {
                const csv = new TextDecoder("utf-8").decode(buffer);
                const data = XLSX.utils.sheet_to_json(XLSX.read(csv, {type:'string'}).Sheets[XLSX.read(csv, {type:'string'}).SheetNames[0]], {header:1});
                process(data.slice(1));
            });
        };

        function process(rows) {
            globalPilots = rows.map(r => ({
                id: String(r[0] || "?"), 
                name: r[1] || "N/A", 
                team: r[2] || "-",
                tier: r[3] || "青銅級", 
                score: parseInt(r[4]) || 0,
                history: r.slice(5).filter(x => x && x !== "#N/A")
            })).filter(p => p.name !== "N/A").sort((a,b) => b.score - a.score);
            
            render(globalPilots);
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function getTeamColor(name) {
            if (!name || name === '-') return '#888';
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 85%, 65%)`;
        }

        function render(pilots) {
            const container = document.getElementById("tableBody");
            container.innerHTML = "";
            
            const totalPilots = pilots.length;
            let tierCounters = { platinum: 0, gold: 0, silver: 0, bronze: 0 };
            let tierRanks = { platinum: 1, gold: 1, silver: 1, bronze: 1 };
            let prevScores = { platinum: -1, gold: -1, silver: -1, bronze: -1 };

            pilots.forEach((p, i) => {
                const tierKey = p.tier.includes("白金") ? "platinum" : p.tier.includes("黃金") ? "gold" : p.tier.includes("白銀") ? "silver" : "bronze";
                
                tierCounters[tierKey]++;
                if (prevScores[tierKey] === -1 || p.score < prevScores[tierKey]) {
                    tierRanks[tierKey] = tierCounters[tierKey];
                }
                prevScores[tierKey] = p.score;

                const rank = tierRanks[tierKey];
                
                let rankClass = "rank-badge-box";
                let rankInlineStyle = "";
                
                if (rank === 1) rankClass += " rank-1-style";
                else if (rank === 2) rankClass += " rank-2-style";
                else if (rank === 3) rankClass += " rank-3-style";
                else if (rank <= 10) rankClass += " rank-top10-style";
                else {
                    const norm = Math.min(rank, 100);
                    const hue = 30 + (norm * 2.2);
                    const light = Math.max(30, 75 - (norm * 0.4));
                    const fs = Math.max(0.8, 1.4 - (norm * 0.005));
                    rankInlineStyle = `color:hsl(${hue},100%,${light}%); border:1px solid hsl(${hue},50%,20%); font-size:${fs}rem; width:auto; height:auto; border-radius:0; line-height:normal; text-shadow:0 0 5px hsl(${hue},100%,20%); padding: 0 4px; border: none;`;
                }

                const barWidth = Math.min(100, (p.score / 420) * 100);
                const atField = ((p.score / 4.5) + 12).toFixed(1);
                
                // 獵人稱號排序（跨越組別的排序）
                let globalRank = i + 1;
                let evaluation = "";
                
                if (globalRank <= 12) {
                    evaluation = "ZODIAC // 12支獵人";
                } else if (globalRank <= totalPilots * 0.25) {
                    evaluation = "3-STAR // 三星獵人";
                } else if (globalRank <= totalPilots * 0.50) {
                    evaluation = "2-STAR // 二星獵人";
                } else if (globalRank <= totalPilots * 0.80) {
                    evaluation = "1-STAR // 一星獵人";
                } else {
                    evaluation = "PRO // 職業獵人";
                }

                const latestHistory = p.history.length > 0 ? p.history[p.history.length - 1] : "N/A";
                const latestCup = p.history.length > 0 ? `CUP-${String(p.history.length).padStart(2,'0')}` : "NO DATA";
                
                let displayTierName = p.tier;
                if (tierKey === 'platinum') displayTierName = "白金級";
                else if (tierKey === 'gold') displayTierName = "黃金級";
                else if (tierKey === 'silver') displayTierName = "白銀級";
                else if (tierKey === 'bronze') displayTierName = "青銅級";

                const resultText = p.history.length > 0 ? `${displayTierName} ${latestHistory}` : "NO COMBAT DATA";

                const teamColor = getTeamColor(p.team);

                const tr = document.createElement("tr");
                tr.className = `row-${tierKey}`;
                tr.dataset.tier = tierKey;
                tr.dataset.json = JSON.stringify({...p, rank, tierKey});
                
                const currentRank = rank;
                tr.onclick = () => openModal(p, currentRank);

                tr.innerHTML = `
                    <td class="col-pilot">
                        <div class="score-bg-watermark">${p.score}</div>
                        
                        <div class="card-header-row">
                            <div class="${rankClass}" style="${rankInlineStyle}">${rank < 10 ? '0'+rank : rank}</div>
                            <div class="pilot-tag">${displayTierName} // ${evaluation}</div>
                        </div>

                        <div class="card-name">${p.name}</div>
                        <div class="card-info">ID: ${p.id} ${p.team !== '-' ? `| 常駐地: <span class="team-badge" style="border-color:${teamColor}; color:${teamColor}; box-shadow: 0 0 8px ${teamColor}40;">${p.team}</span>` : ''}</div>
                        
                        <div class="card-latest-row">
                            <span style="color:var(--eva-green)">LAST // ${latestCup}</span>
                            <span class="result-highlight">${resultText}</span>
                        </div>

                        <div class="sync-bar-container"><div class="sync-fill" style="width: ${barWidth}%"><span class="sync-text"></span></div></div>
                        <div class="stats-hud">
                            <div>A.T. FIELD: ${atField}%</div>
                            <div>BERSERK: ${(p.score % 14).toFixed(1)}%</div>
                        </div>
                    </td>
                `;
                container.appendChild(tr);
            });
            
            filterTier(currentFilter);
        }

        function filterTier(tier) {
            currentFilter = tier;
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            const btnSelector = tier === 'platinum' ? '.btn-plat' : tier === 'gold' ? '.btn-gold' : tier === 'silver' ? '.btn-silver' : '.btn-bronze';
            const targetBtn = document.querySelector(btnSelector);
            if(targetBtn) targetBtn.classList.add("active");
            
            searchPilot();
        }

        function searchPilot() {
            const inputVal = document.getElementById("searchInput").value;
            const term = inputVal ? inputVal.toUpperCase().trim() : "";

            document.querySelectorAll("#tableBody tr").forEach(tr => {
                const data = JSON.parse(tr.dataset.json);
                const tierKey = tr.dataset.tier;
                
                const nameStr = String(data.name).toUpperCase();
                const idStr = String(data.id).toUpperCase();
                const teamStr = String(data.team).toUpperCase();

                const matchTerm = nameStr.includes(term) || idStr.includes(term) || teamStr.includes(term);
                const matchTier = (tierKey === currentFilter);
                
                if (matchTerm && matchTier) {
                    tr.style.display = "flex";
                } else {
                    tr.style.display = "none";
                }
            });
        }

        function calculateStars(score) {
            if (score >= 400) return '★★★★★';
            if (score >= 300) return '★★★★';
            if (score >= 200) return '★★★';
            if (score >= 100) return '★★';
            return '★';
        }

        function getBattleSettings(id) {
            const strId = String(id);
            let seed = 0;
            for (let i = 0; i < strId.length; i++) {
                seed = strId.charCodeAt(i) + ((seed << 5) - seed);
            }
            const seededRandom = function(offset) {
                var x = Math.sin(seed + offset) * 10000;
                return x - Math.floor(x);
            };

            const types = [
                { code: "ASSAULT", name: "ENHANCER // 強化系", color: "#ff4444" },
                { code: "FORTRESS", name: "CONJURER // 具現化系", color: "#00e5ff" },
                { code: "SPEED", name: "TRANSMUTER // 變化系", color: "#ffee00" },
                { code: "TACTIC", name: "MANIPULATOR // 操作系", color: "#00e676" }
            ];
            
            const titles = [
                "幻影的", "貪婪的", "暗殺的", "具現化的", "暴走的", "誓約的", "神速的", "念能力的", "絕對的", "不屈的",
                "黑暗的", "深淵的", "究極的", "無慈悲的", "特質的", "強化的", "變化的", "操作的", "放出的", "奇蹟的",
                "猩紅的", "蒼幽的", "狂氣的", "孤傲的", "禁忌的", "隱秘的", "災厄的", "破壞的", "幻獸的", "漆黑的",
                "無雙的", "萬能的", "瞬殺的", "不敗的", "傳說的", "鬼神的", "無音的", "殘影的", "虛空的", "混沌的",
                "覺醒的", "制約的", "極限的", "異端的", "血色的", "致命的", "絕望的", "無盡的", "鋼鐵的", "魔性的"
            ];
            
            const titles2 = [
                "旅團成員", "遺跡獵人", "戰鬥狂", "考官", "樓主", "十二支", "守門人", "除念師", "暗殺者", "念能力者",
                "賞金獵人", "幻獸獵人", "美食獵人", "契約者", "具現化師", "操作者", "變化使", "強化兵", "放出使", "特質系",
                "陰獸", "揍敵客", "嵌合蟻", "師團長", "護衛軍", "會長", "鬥技者", "殺手", "念大師", "支配者",
                "破壞神", "守護神", "狙擊手", "魔術師", "處刑人", "狂戰士", "炸彈魔", "盜賊", "蜘蛛", "貪婪玩家",
                "念獸", "潛伏者", "狩獵者", "復仇者", "亡命之徒", "裁決者", "尋寶獵人", "協專獵人", "一星獵人", "二星獵人"
            ];

            const typeIndex = Math.floor(seededRandom(1) * types.length);
            const titleIndex1 = Math.floor(seededRandom(2) * titles.length);
            const titleIndex2 = Math.floor(seededRandom(3) * titles2.length);
            const imageIndex = Math.floor(seededRandom(4) * 20) + 1;

            return {
                type: types[typeIndex],
                title: `${titles[titleIndex1]} ${titles2[titleIndex2]}`,
                imageUrl: `https://api.dicebear.com/7.x/bottts/svg?seed=${strId}_${imageIndex}&textureChance=50`
            };
        }

        function openModal(p, rank) {
            const settings = getBattleSettings(p.id);
            
            let luxuryClass = "rank-c";
            let rankCode = "c";
            let rankLabel = "C-RANK // UNIT";

            const tierKey = p.tier.includes("白金") ? "platinum" : p.tier.includes("黃金") ? "gold" : p.tier.includes("白銀") ? "silver" : "bronze";

            if (tierKey === 'platinum') { luxuryClass = "rank-ssr"; rankCode = "ssr"; rankLabel = "PLATINUM // 白金級"; }
            else if (tierKey === 'gold') { luxuryClass = "rank-sr"; rankCode = "sr"; rankLabel = "GOLD // 黃金級"; }
            else if (tierKey === 'silver') { luxuryClass = "rank-a"; rankCode = "a"; rankLabel = "SILVER // 白銀級"; }
            else { luxuryClass = "rank-b"; rankCode = "b"; rankLabel = "BRONZE // 青銅級"; }

            const stars = calculateStars(p.score); 
            const s = p.score;
            const attrs = [Math.min(99, 60+(s%30)), Math.min(99, 50+(s%40)), Math.min(99, 70+(s%20)), Math.min(99, 55+(s%35))];

            const currentTierName = p.tier.split(' ')[0];

            let historyHTML = "";
            if (p.history && p.history.length > 0) {
                historyHTML = p.history.map((record, index) => {
                    const cupName = `CUP-${String(index + 1).padStart(2, '0')}`;
                    let displayRecord = record;
                    
                    if (!displayRecord.includes('級')) {
                        const tierNameToAdd = tierKey === 'platinum' ? '白金級' : tierKey === 'gold' ? '黃金級' : tierKey === 'silver' ? '白銀級' : '青銅級';
                        displayRecord = `${tierNameToAdd} ${displayRecord}`;
                    }

                    return `<div class="history-tag">${cupName}: ${displayRecord}</div>`;
                }).join("");
            } else {
                historyHTML = `<span style="color:#555; font-style:italic;">NO COMBAT RECORD FOUND</span>`;
            }
            
            const teamColor = getTeamColor(p.team);

            const modal = document.getElementById("playerModal");
            modal.dataset.rank = rankCode;

            const modalHTML = `
                <div class="modal-card ${luxuryClass}" id="tiltCard">
                    <div class="close-modal" onclick="closeModal()">✕</div>
                    <div class="card-header-bar">
                        <span class="header-stars">${stars}</span>
                        <span class="header-tier-text">${rankLabel}</span>
                    </div>
                    <div class="card-visual-area">
                        <div class="battle-type-badge" style="border-color:${settings.type.color}; color:${settings.type.color}">${settings.type.name}</div>
                        <div class="pilot-title">"${settings.title}"</div>
                        <img class="cartoon-avatar" src="${settings.imageUrl}" alt="Mecha Unit">
                        <div class="card-radar-bg" id="radarChart"></div>
                    </div>
                    <div class="card-info-area">
                        <div class="info-name">${p.name}</div>
                        <div class="info-meta"><span>ID: ${p.id}</span><span>常駐地: ${p.team !== '-' ? `<span class="team-badge" style="border-color:${teamColor}; color:${teamColor}; box-shadow: 0 0 8px ${teamColor}40;">${p.team}</span>` : 'NONE'}</span></div>
                        
                        <div class="skill-chips">
                            <div class="chip">發: ${attrs[0]}</div><div class="chip">堅: ${attrs[1]}</div><div class="chip">迅: ${attrs[2]}</div><div class="chip">流: ${attrs[3]}</div>
                        </div>

                        <div class="card-history-box">
                            <div class="history-label">
                                <span>BATTLE LOG</span>
                                <span>REC: ${p.history.length}</span>
                            </div>
                            <div class="history-list-content">
                                ${historyHTML}
                            </div>
                        </div>

                        <div class="card-sync-box"><span class="card-sync-label">SYNC RATE</span><span class="card-sync-val" id="mScore">0</span></div>
                    </div>
                </div>
            `;

            modal.innerHTML = modalHTML;
            modal.style.display = "flex";

            const card = document.getElementById("tiltCard");
            modal.addEventListener("mousemove", (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const centerX = rect.width/2; const centerY = rect.height/2;
                card.style.transform = `perspective(1000px) rotateX(${((y-centerY)/centerY)*-10}deg) rotateY(${((x-centerX)/centerX)*10}deg)`;
            });
            modal.addEventListener("mouseleave", () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            });

            drawRadar(p.score);
            const scoreEl = document.getElementById("mScore");
            let start = 0; const end = p.score;
            function animateScore() { start += Math.ceil((end-start)/10); scoreEl.innerText = start; if(start < end) requestAnimationFrame(animateScore); }
            animateScore();
        }

        function drawRadar(score) {
            const container = document.getElementById("radarChart");
            if(!container) return;
            const size = 250, center = size/2, radius = 90;
            const stats = [Math.min(1, 0.5+(score%20)/40+0.2), Math.min(1, 0.5+(score%15)/35+0.2), Math.min(1, 0.5+(score%18)/40+0.2), Math.min(1, 0.5+(score%22)/45+0.2), Math.min(1, 0.5+(score%12)/30+0.2), Math.min(1, 0.5+(score%25)/50+0.2)];
            const angles = [0, 60, 120, 180, 240, 300];
            const points = angles.map((a, i) => { const rad = (a-90)*Math.PI/180; return `${center+radius*stats[i]*Math.cos(rad)},${center+radius*stats[i]*Math.sin(rad)}`; }).join(" ");
            let svgHTML = `<svg width="100%" height="100%" viewBox="0 0 ${size} ${size}">`;
            [1, 0.5].forEach(s => { const p = angles.map(a => `${center+radius*s*Math.cos((a-90)*Math.PI/180)},${center+radius*s*Math.sin((a-90)*Math.PI/180)}`).join(" "); svgHTML += `<polygon points="${p}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />`; });
            svgHTML += `<polygon points="${points}" fill="rgba(0, 229, 255, 0.4)" stroke="var(--eva-purple)" stroke-width="2" /></svg>`;
            container.innerHTML = svgHTML;
        }

        function closeModal() { document.getElementById("playerModal").style.display = "none"; }
    </script>
</body>
</html>
